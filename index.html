        function addMarkToMap(mark) {
            if (!map) {
                console.error('❌ Cannot add mark - map is null');
                return;
            }
            
            const colors = {
                start: '#3B82F6',
                windward: '#10B981',
                leeward: '#FBBF24',
                finish: '#A855F7'
            };

            const icons = {
                start: '▲',        // Triangle for start
                windward: '●',     // Circle for windward
                leeward: '◆',      // Diamond for leeward (gate)
                finish: '■'        // Square for finish
            };

            const marker = L.marker([mark.lat, mark.lon], {
                icon: L.divIcon({
                    className: 'custom-mark',
                    html: `<div style="background: ${colors[mark.type]}; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: 2px solid white;">${icons[mark.type]}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                }),
                draggable: true  // Make marker draggable
            }).addTo(map);
            
            marker.bindPopup(`<strong>${mark.type.toUpperCase()} MARK</strong><br/><span style="font-size: 11px; color: #666;">Drag to adjust position</span>`);
            
            // Update mark position and redraw laylines when dragged
            marker.on('dragend', function(event) {
                const position = event.target.getLatLng();
                mark.lat = position.lat;
                mark.lon = position.lng;
                
                console.log(`📍 ${mark.type} mark moved to ${position.lat.toFixed(6)}, ${position.lng.toFixed(6)}`);
                
                // If windward mark, redraw laylines
                if (mark.type === 'windward' && analysis && analysis.laylines) {
                    // Remove old laylines
                    map.eachLayer(layer => {
                        if (layer instanceof L.Polyline && layer.options.className && layer.options.className.includes('layline-upwind')) {
                            map.removeLayer(layer);
                        }
                    });
                    // Draw new laylines from updated position
                    drawLaylines(mark.lat, mark.lon);
                }
                
                // If leeward mark, redraw downwind laylines
                if (mark.type === 'leeward' && analysis && analysis.downwindLaylines) {
                    // Remove old downwind laylines
                    map.eachLayer(layer => {
                        if (layer instanceof L.Polyline && layer.options.className && layer.options.className.includes('layline-downwind')) {
                            map.removeLayer(layer);
                        }
                    });
                    // Draw new laylines from updated position
                    drawDownwindLaylines(mark.lat, mark.lon);
                }
            });
            
            // If windward mark, draw laylines
            if (mark.type === 'windward' && analysis && analysis.laylines) {
                drawLaylines(mark.lat, mark.lon);
            }
            
            // If leeward mark, draw downwind laylines
            if (mark.type === 'leeward' && analysis && analysis.downwindLaylines) {
                drawDownwindLaylines(mark.lat, mark.lon);
            }
        }
        
        /**
         * LAYLINES - Visual Guide for Windward Mark Approach
         * 
         * 🏁 What Laylines Show:
         * 
         *               WINDWARD MARK
         *                     ●
         *                    /|\
         *                   / | \
         *       PORT       /  |  \      STARBOARD
         *       LAYLINE   /   |   \     LAYLINE
         *      (RED)     /    |    \    (GREEN)
         *               /     |     \
         *              /      |      \
         *             /   OPTIMAL     \
         *            /     APPROACH    \
         *           /       ZONE        \
         *          /                     \
         *         /                       \
         *        /                         \
         *       /         YOUR TRACK         \
         *      /      (colored by VMG)        \
         *     🔵Tack                     Tack🔵
         * 
         * Visual Guide:
         * - RED line: Port layline (windDir + 45°)
         * - GREEN line: Starboard layline (windDir - 45°)
         * - Both extend ~1000m from mark
         * 
         * Tactical Use:
         * - Cross layline → tack immediately (don't overshoot!)
         * - Inside cone → keep sailing
         * - Shows optimal approach corridor
         */
        function drawLaylines(markLat, markLon) {
            if (!map || !analysis || !analysis.laylines) return;
            
            const windDir = analysis.laylines.windDirection;
            const pointingAngle = 45; // Standard 45° TWA for simplicity
            
            // Calculate layline headings (directions lines extend FROM the mark)
            // Port layline: Wind direction + 45° (RED)
            // Starboard layline: Wind direction - 45° (GREEN)
            const portLaylineHeading = (windDir + pointingAngle) % 360;
            const stbdLaylineHeading = (windDir - pointingAngle + 360) % 360;
            
            // Convert headings to radians for trigonometry
            const portAngle = portLaylineHeading * Math.PI / 180;
            const stbdAngle = stbdLaylineHeading * Math.PI / 180;
            
            // Extend laylines ~0.01 degrees (roughly 1km at this latitude)
            const lineLength = 0.01;
            
            // PORT LAYLINE (RED) - extends downwind from mark
            // When you cross this line on starboard tack → tack to port
            const portStart = [markLat, markLon];
            const portEnd = [
                markLat - lineLength * Math.cos(portAngle),
                markLon - lineLength * Math.sin(portAngle)
            ];
            
            const portLayline = L.polyline([portStart, portEnd], {
                color: '#EF4444',  // RED - port layline
                weight: 3,
                opacity: 0.8,
                dashArray: '15, 10',
                className: 'layline layline-port layline-upwind'
            }).addTo(map);
            
            mapLayers.upwindLaylines.push(portLayline);  // Track for toggles
            
            portLayline.bindPopup(`
                <div style="text-align: center;">
                    <strong style="color: #EF4444; font-size: 14px;">🔴 PORT LAYLINE</strong><br/>
                    <span style="font-size: 12px; color: #666;">
                        Cross on starboard → tack to port<br/>
                        Sail ${portLaylineHeading.toFixed(0)}° at 45° TWA to mark
                    </span>
                </div>
            `);
            
            // STARBOARD LAYLINE (GREEN) - extends downwind from mark
            // When you cross this line on port tack → tack to starboard
            const stbdStart = [markLat, markLon];
            const stbdEnd = [
                markLat - lineLength * Math.cos(stbdAngle),
                markLon - lineLength * Math.sin(stbdAngle)
            ];
            
            const stbdLayline = L.polyline([stbdStart, stbdEnd], {
                color: '#10B981',  // GREEN - starboard layline
                weight: 3,
                opacity: 0.8,
                dashArray: '15, 10',
                className: 'layline layline-stbd layline-upwind'
            }).addTo(map);
            
            mapLayers.upwindLaylines.push(stbdLayline);  // Track for toggles
            
            stbdLayline.bindPopup(`
                <div style="text-align: center;">
                    <strong style="color: #10B981; font-size: 14px;">🟢 STARBOARD LAYLINE</strong><br/>
                    <span style="font-size: 12px; color: #666;">
                        Cross on port → tack to starboard<br/>
                        Sail ${stbdLaylineHeading.toFixed(0)}° at 45° TWA to mark
                    </span>
                </div>
            `);
            
            console.log(`📐 Laylines drawn from mark [${markLat.toFixed(4)}, ${markLon.toFixed(4)}]:`);
            console.log(`   🔴 Port: ${portLaylineHeading.toFixed(0)}° (windDir ${windDir}° + 45°)`);
            console.log(`   🟢 Starboard: ${stbdLaylineHeading.toFixed(0)}° (windDir ${windDir}° - 45°)`);
        }
        
        /**
         * Remove all laylines from map
         */
        function clearLaylines() {
            if (!map) return;
            map.eachLayer(layer => {
                if (layer.options && layer.options.className && layer.options.className.includes('layline')) {
                    map.removeLayer(layer);
                }
            });
            // Clear tracking arrays
            mapLayers.upwindLaylines = [];
            mapLayers.downwindLaylines = [];
        }
        
        /**
         * DOWNWIND LAYLINES - Visual guide for leeward mark approach
         * For asymmetric spinnaker reaching angles
         */
        function drawDownwindLaylines(markLat, markLon) {
            if (!map || !analysis || !analysis.downwindLaylines) return;
            
            const windDir = analysis.downwindLaylines.windDirection;
            const reachingAngle = analysis.downwindLaylines.reachingAngle;
            
            // Calculate downwind layline headings (lines extend UPWIND from leeward mark)
            // Port gybe layline: Wind direction + reaching angle (ORANGE)
            // Starboard gybe layline: Wind direction - reaching angle (PURPLE)
            const portGybeHeading = (windDir + reachingAngle) % 360;
            const stbdGybeHeading = (windDir - reachingAngle + 360) % 360;
            
            // Convert to radians
            const portAngle = portGybeHeading * Math.PI / 180;
            const stbdAngle = stbdGybeHeading * Math.PI / 180;
            
            // Extend laylines upwind from leeward mark (~1km)
            const lineLength = 0.01;
            
            // PORT GYBE LAYLINE (ORANGE) - extends upwind from mark
            const portStart = [markLat, markLon];
            const portEnd = [
                markLat + lineLength * Math.cos(portAngle),
                markLon + lineLength * Math.sin(portAngle)
            ];
            
            const portGybeLayline = L.polyline([portStart, portEnd], {
                color: '#F97316',  // ORANGE - port gybe layline
                weight: 3,
                opacity: 0.8,
                dashArray: '10, 5',  // Different pattern from upwind
                className: 'layline layline-downwind layline-port-gybe'
            }).addTo(map);
            
            mapLayers.downwindLaylines.push(portGybeLayline);
            
            portGybeLayline.bindPopup(`
                <div style="text-align: center;">
                    <strong style="color: #F97316; font-size: 14px;">🟠 PORT GYBE LAYLINE</strong><br/>
                    <span style="font-size: 12px; color: #666;">
                        Cross on starboard gybe → gybe to port<br/>
                        Sail ${portGybeHeading.toFixed(0)}° at ${reachingAngle}° TWA to mark
                    </span>
                </div>
            `);
            
            // STARBOARD GYBE LAYLINE (PURPLE) - extends upwind from mark
            const stbdStart = [markLat, markLon];
            const stbdEnd = [
                markLat + lineLength * Math.cos(stbdAngle),
                markLon + lineLength * Math.sin(stbdAngle)
            ];
            
            const stbdGybeLayline = L.polyline([stbdStart, stbdEnd], {
                color: '#A855F7',  // PURPLE - starboard gybe layline
                weight: 3,
                opacity: 0.8,
                dashArray: '10, 5',  // Different pattern from upwind
                className: 'layline layline-downwind layline-stbd-gybe'
            }).addTo(map);
            
            mapLayers.downwindLaylines.push(stbdGybeLayline);
            
            stbdGybeLayline.bindPopup(`
                <div style="text-align: center;">
                    <strong style="color: #A855F7; font-size: 14px;">🟣 STARBOARD GYBE LAYLINE</strong><br/>
                    <span style="font-size: 12px; color: #666;">
                        Cross on port gybe → gybe to starboard<br/>
                        Sail ${stbdGybeHeading.toFixed(0)}° at ${reachingAngle}° TWA to mark
                    </span>
                </div>
            `);
            
            console.log(`📐 Downwind laylines drawn from mark [${markLat.toFixed(4)}, ${markLon.toFixed(4)}]:`);
            console.log(`   🟠 Port gybe: ${portGybeHeading.toFixed(0)}° (windDir ${windDir}° + ${reachingAngle}°)`);
            console.log(`   🟣 Starboard gybe: ${stbdGybeHeading.toFixed(0)}° (windDir ${windDir}° - ${reachingAngle}°)`);
        }

        /**
         * Setup layer toggle functionality
         */
        function setupLayerToggles() {
            const toggleButtons = {
                'toggleTrack': 'track',
                'toggleUpwindLaylines': 'upwind-laylines',
                'toggleDownwindLaylines': 'downwind-laylines',
                'toggleShiftZones': 'shift-zones',
                'toggleManeuvers': 'maneuvers',
                'toggleShiftMarkers': 'shift-markers',
                'toggleStartLine': 'start-line',
                'toggleFinishLine': 'finish-line'
            };
            
            Object.keys(toggleButtons).forEach(buttonId => {
                const button = document.getElementById(buttonId);
                const layerKey = toggleButtons[buttonId];
                
                if (!button) return; // Skip missing buttons
                
                button.addEventListener('click', () => {
                    try {
                        // Toggle visibility state
                        layerVisibility[layerKey] = !layerVisibility[layerKey];
                        
                        // Update button appearance
                        if (layerVisibility[layerKey]) {
                            button.classList.remove('inactive');
                            button.classList.add('active');
                        } else {
                            button.classList.remove('active');
                            button.classList.add('inactive');
                        }
                        
                        // Show/hide layers on map
                        toggleMapLayer(layerKey, layerVisibility[layerKey]);
                    } catch (error) {
                        console.error(`❌ Error toggling layer ${layerKey}:`, error);
                    }
                });
            });
        }
        
        /**
         * Toggle visibility of map layers
         */
        function toggleMapLayer(layerKey, visible) {
            if (!map) return;
            
            // Map layer keys to class names
            const layerClassMap = {
                'track': 'gps-track',
                'upwind-laylines': 'layline-upwind',
                'downwind-laylines': 'layline-downwind',
                'shift-zones': 'wind-shift-zone',
                'maneuvers': 'maneuver-marker',
                'shift-markers': 'shift-marker',
                'start-line': 'start-line',
                'finish-line': 'finish-line'
            };
            
            const className = layerClassMap[layerKey];
            if (!className) return;
            
            map.eachLayer(layer => {
                // Check if layer has the class we're looking for
                if (layer.options && layer.options.className && layer.options.className.includes(className)) {
                    if (visible) {
                        layer.setStyle({ opacity: layer.options.originalOpacity || 0.8 });
                        if (layer.setStyle && layer.options.fillOpacity) {
                            layer.setStyle({ fillOpacity: layer.options.originalFillOpacity || 0.2 });
                        }
                    } else {
                        // Store original opacity if not already stored
                        if (!layer.options.originalOpacity) {
                            layer.options.originalOpacity = layer.options.opacity;
                        }
                        if (layer.options.fillOpacity && !layer.options.originalFillOpacity) {
                            layer.options.originalFillOpacity = layer.options.fillOpacity;
                        }
                        // Hide by setting opacity to 0
                        layer.setStyle({ opacity: 0 });
                        if (layer.setStyle && layer.options.fillOpacity !== undefined) {
                            layer.setStyle({ fillOpacity: 0 });
                        }
                    }
                }
                
                // Special handling for CircleMarkers (tacks/gybes/shifts)
                if (layer instanceof L.CircleMarker) {
                    if ((layerKey === 'maneuvers' && (
                        (layer.options.color === '#3B82F6') || // Tack color
                        (layer.options.color === '#F59E0B')    // Gybe color
                    )) || (layerKey === 'shift-markers' && (
                        (layer.options.fillColor === '#10B981') || // Lift color
                        (layer.options.fillColor === '#EF4444')    // Header color
                    ))) {
                        if (visible) {
                            layer.setStyle({ opacity: 1, fillOpacity: layer.options.originalFillOpacity || 0.9 });
                        } else {
                            if (!layer.options.originalFillOpacity) {
                                layer.options.originalFillOpacity = layer.options.fillOpacity;
                            }
                            layer.setStyle({ opacity: 0, fillOpacity: 0 });
                        }
                    }
                }
                
                // Special handling for polylines (start/finish lines)
                if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
                    if ((layerKey === 'start-line' && layer === startLinePolyline) ||
                        (layerKey === 'finish-line' && layer === finishLinePolyline)) {
                        if (visible) {
                            layer.setStyle({ opacity: layer.options.originalOpacity || 0.8 });
                        } else {
                            if (!layer.options.originalOpacity) {
                                layer.options.originalOpacity = layer.options.opacity;
                            }
                            layer.setStyle({ opacity: 0 });
                        }
                    }
                }
            });
        }

        // Mobile menu toggle
        function setupMobileMenu() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            
            if (!menuBtn || !sidebar || !overlay) return;
            
            function toggleMenu(e) {
                e.preventDefault();
                e.stopPropagation();
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }
            
            function closeMenu(e) {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
            
            // Support both touch and click events for iPad/mobile
            // Use touchend instead of touchstart for better iOS compatibility
            menuBtn.addEventListener('click', toggleMenu);
            menuBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                toggleMenu(e);
            }, { passive: false });
            
            overlay.addEventListener('click', closeMenu);
            overlay.addEventListener('touchend', function(e) {
                e.preventDefault();
                closeMenu(e);
            }, { passive: false });
            
            // Close menu when clicking a link/button in sidebar
            sidebar.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') {
                    setTimeout(closeMenu, 300); // Delay to allow action to complete
                }
            });
        }

        // ================================================================
        // SESSION PERSISTENCE — IndexedDB
        // ================================================================
        const _DB_NAME = 'SailAI_Sessions';
        const _DB_VERSION = 1;
        const _DB_STORE = 'sessions';
        const _MAX_SESSIONS = 5;

        function openSessionDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(_DB_NAME, _DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(_DB_STORE)) {
                        db.createObjectStore(_DB_STORE, { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = () => resolve(null);  // fail gracefully
            });
        }

        async function saveSessionToDB() {
            if (!csvData || csvData.length === 0) return;
            try {
                const db = await openSessionDB();
                if (!db) return;
                // Get existing sessions to enforce cap
                const allSessions = await loadRecentSessions();
                if (allSessions.length >= _MAX_SESSIONS) {
                    // Delete oldest
                    const oldest = allSessions[allSessions.length - 1];
                    const delTx = db.transaction(_DB_STORE, 'readwrite');
                    delTx.objectStore(_DB_STORE).delete(oldest.id);
                }
                const firstRow = csvData[0];
                const dateStr = firstRow.timestamp || firstRow.time || new Date().toISOString();
                const sessionId = 'session_' + Date.now();
                const tx = db.transaction(_DB_STORE, 'readwrite');
                tx.objectStore(_DB_STORE).put({
                    id: sessionId,
                    name: `${getClassLabel()} session`,
                    date: dateStr,
                    boatClass: selectedClass,
                    csvData: csvData,
                    windDir: windDir,
                    races: JSON.parse(JSON.stringify(races)),
                    timestamp: Date.now()
                });
                console.log('💾 Session saved to IndexedDB:', sessionId);
                // Refresh recent sessions in sidebar
                renderRecentSessionsPanel();
            } catch (e) {
                console.warn('Session save failed:', e);
            }
        }

        async function loadRecentSessions() {
            try {
                const db = await openSessionDB();
                if (!db) return [];
                return new Promise((resolve) => {
                    const tx = db.transaction(_DB_STORE, 'readonly');
                    const req = tx.objectStore(_DB_STORE).getAll();
                    req.onsuccess = () => {
                        resolve((req.result || []).sort((a,b) => b.timestamp - a.timestamp).slice(0, _MAX_SESSIONS));
                    };
                    req.onerror = () => resolve([]);
                });
            } catch (e) { return []; }
        }

        async function loadSessionFromDB(sessionId) {
            try {
                const db = await openSessionDB();
                if (!db) return;
                const tx = db.transaction(_DB_STORE, 'readonly');
                const req = tx.objectStore(_DB_STORE).get(sessionId);
                req.onsuccess = () => {
                    const session = req.result;
                    if (!session || !session.csvData) return;
                    setBoatClass(session.boatClass || 'M15');
                    if (session.windDir !== undefined) windDir = session.windDir;
                    if (session.races && session.races.length > 0) races = session.races;
                    csvData = session.csvData;
                    window._pendingSessionSave = false;  // don't re-save on DB restore
                    // Exit welcome mode and unlock sidebar
                    document.body.classList.remove('welcome-mode');
                    enableAllSections();
                    // Sync sidebar UI with restored state
                    renderRaces();
                    expandSidebarSection('analysis');
                    showStatus('Restoring session...', session.name);
                    setTimeout(() => { analyzeData(); }, 50);
                };
            } catch (e) { console.warn('Session load failed:', e); }
        }

        async function clearAllSessions() {
            try {
                const db = await openSessionDB();
                if (!db) return;
                const tx = db.transaction(_DB_STORE, 'readwrite');
                tx.objectStore(_DB_STORE).clear();
                renderRecentSessionsPanel();
            } catch (e) {}
        }

        async function renderRecentSessionsPanel() {
            const container = document.getElementById('recentSessionsPanel');
            if (!container) return;
            const sessions = await loadRecentSessions();
            if (sessions.length === 0) {
                container.innerHTML = '<p style="font-size:0.72rem;color:#4B5563;font-style:italic;">No saved sessions yet</p>';
                return;
            }
            container.innerHTML = sessions.map(s => {
                const d = new Date(s.date);
                const dateStr = isNaN(d) ? 'Unknown date' : d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
                const raceCount = s.races ? s.races.length : 0;
                return `<div onclick="loadSessionFromDB('${s.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#1F2937;border:1px solid #374151;border-radius:6px;margin-bottom:4px;cursor:pointer;" onmouseover="this.style.background='#243040'" onmouseout="this.style.background='#1F2937'">
                    <div>
                        <div style="font-size:0.8rem;font-weight:600;color:#D1D5DB;">${s.name || 'Session'}</div>
                        <div style="font-size:0.68rem;color:#6B7280;">${dateStr} · ${s.boatClass} · ${raceCount} race${raceCount!==1?'s':''}</div>
                    </div>
                    <span style="font-size:0.72rem;color:#3B82F6;font-weight:600;">Load →</span>
                </div>`;
            }).join('') + `<div style="text-align:right;margin-top:4px;"><span onclick="clearAllSessions()" style="font-size:0.65rem;color:#4B5563;cursor:pointer;text-decoration:underline;">Clear saved sessions</span></div>`;
        }

                                Polar diagrams, heel &amp; trim optimization, tack/gybe efficiency, VMG analysis, wind shift detection
                            </div>
                        </div>
                        <div style="background:#1F2937;border:1px solid #374151;border-radius:10px;padding:1rem;">
                            <div style="font-size:0.85rem;font-weight:700;color:#60A5FA;margin-bottom:0.5rem;">🏁 Race</div>
                            <div style="font-size:0.78rem;color:#9CA3AF;line-height:1.6;">
                                GPS track map, full coaching debrief with class-specific expert benchmarks, regatta mode for multi-race days

                        <div style="background:#1F2937;border:1px solid #374151;border-radius:10px;padding:1rem;">

                <div style="margin-top:2rem;">

                        <div style="background:#1F2937;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;">

            </div>`;
        }

        async function renderWelcomeRecentSessions() {
            const container = document.getElementById('welcomeRecentSessions');
            if (!container) return;
            const sessions = await loadRecentSessions();
            if (sessions.length === 0) { container.innerHTML = ''; return; }
            let html = `<div style="font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4B5563;margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid #1F2937;">
                Pick Up Where You Left Off
            </div>`;
            html += sessions.map(s => {
                const d = new Date(s.date);
                const dateStr = isNaN(d) ? 'Unknown' : d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
                const raceCount = s.races ? s.races.length : 0;
                return `<div onclick="loadSessionFromDB('${s.id}')" style="
                    display:flex;justify-content:space-between;align-items:center;
                    padding:12px 14px;background:#1F2937;border:1px solid #374151;
                    border-radius:8px;margin-bottom:6px;cursor:pointer;
                "
                onmouseover="this.style.background='#243040'" onmouseout="this.style.background='#1F2937'">
                    <div>
                        <div style="font-size:0.9rem;font-weight:600;color:#D1D5DB;">${s.name || 'Session'}</div>
                        <div style="font-size:0.75rem;color:#6B7280;">${dateStr} · ${s.boatClass} · ${raceCount} race${raceCount!==1?'s':''}</div>
                    </div>
                    <span style="font-size:0.8rem;color:#3B82F6;font-weight:600;">Load →</span>
                </div>`;
            }).join('');
            container.innerHTML = html;
        }

        // ================================================================
        // SIDEBAR SECTION DIM / ENABLE (Task 3)
        // ================================================================
        function dimUnavailableSections() {
            ['analysis', 'fleet'].forEach(id => {
                const header = document.getElementById('sidebarHeader_' + id);
                if (header) { header.style.opacity = '0.35'; header.style.pointerEvents = 'none'; }
            });
        }

        function enableAllSections() {
            ['analysis', 'fleet'].forEach(id => {
                const header = document.getElementById('sidebarHeader_' + id);
                if (header) { header.style.opacity = '1'; header.style.pointerEvents = 'auto'; }
            });
        }

        window.onload = initApp;
        
        // AUTO-UPDATE SERVICE WORKER HANDLER
        let swRegistration = null;
        let updateBannerDismissed = false;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered:', registration.scope);
                        swRegistration = registration;
                        
                        // Check for updates every 60 seconds
                        setInterval(() => {
                            console.log('🔄 Checking for updates...');
                            registration.update();
                        }, 60000);
                        
                        // Listen for service worker updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('📦 New service worker found, installing...');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('✅ New service worker installed! Update available.');
                                    showUpdateBanner();
                                }
                            });
                        });
                    })
                    .catch(err => {
                        console.error('❌ Service Worker registration failed:', err);
                    });
                
                // Listen for messages from service worker
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'SW_UPDATED') {
                        console.log('📢 Service worker updated to version:', event.data.version);
                        if (!updateBannerDismissed) {
                            showUpdateBanner();
                        }
                    }
                });
                
                // Detect if controller changed
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        console.log('🔄 Service worker controller changed, reloading...');
                        window.location.reload();
                    }
                });
            });
        }

        function showUpdateBanner() {
            const banner = document.getElementById('updateBanner');
            const updateBtn = document.getElementById('updateBtn');
            const dismissBtn = document.getElementById('dismissBtn');
            
            if (banner) {
                banner.style.display = 'block';
                
                updateBtn.onclick = () => {
                    console.log('🚀 User clicked Update Now');
                    if (swRegistration && swRegistration.waiting) {
                        swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                    window.location.reload();
                };
                
                dismissBtn.onclick = () => {
                    console.log('⏭️ User dismissed update banner');
                    banner.style.display = 'none';
                    updateBannerDismissed = true;
                };
            }
        }
    </script>
