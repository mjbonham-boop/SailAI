                        'Tack more aggressively on headers to minimize time on unfavorable tack' :
                        'Good wind shift awareness - keep tacking on headers'
                });
                
                if (tacksOnLifts > tacksOnHeaders) {
                    tackTimingAnalysis.push({
                        metric: 'Tacks on Lifts',
                        value: `${tacksOnLifts} tacks during favorable conditions`,
                        assessment: 'concerning',
                        recommendation: 'Avoid tacking when lifted - stay on the lifted tack as long as possible'
                    });
                }
            }
            
            analysis.tackTiming = {
                onHeaders: tacksOnHeaders,
                onLifts: tacksOnLifts,
                neutral: tacksNeutral,
                score: tackTimingScore,
                analysis: tackTimingAnalysis
            };
            
            console.log(`⚓ Heel by wind: Light ${optimalHeelLightAir}° (${lightAir.length} pts), Moderate ${optimalHeelModerateAir}° (${moderateAir.length} pts)`);
            console.log(`⚓ Leeway: ${avgLeeway.toFixed(1)}° - ${analysis.leewayAnalysis.concernLevel.toUpperCase()}`);

            // CALCULATE POINTING ANGLE (tightest TWA with good VMG)
            const tightUpwind = upwind.filter(r => r.vmg > 0);
            const twaByAngle = {};
            tightUpwind.forEach(r => {
                const twa = Math.abs(r.twa_cog);
                const bin = Math.round(twa / 2) * 2;
                if (!twaByAngle[bin]) twaByAngle[bin] = [];
                twaByAngle[bin].push(r.vmg);
            });
            
            let bestPointingAngle = 45; // Default for Melges 15
            let bestPointingVMG = 0;
            
            // Find tightest angle where we still maintain good VMG (>90% of max)
            for (let angle = 30; angle <= 55; angle += 2) {
                if (!twaByAngle[angle] || twaByAngle[angle].length < 30) continue;
                const avgVMG = twaByAngle[angle].reduce((a, b) => a + b, 0) / twaByAngle[angle].length;
                if (avgVMG > bestPointingVMG * 0.9 && avgVMG > 0) {
                    bestPointingAngle = angle;
                    bestPointingVMG = Math.max(bestPointingVMG, avgVMG);
                }
            }
            
            // Laylines calculation - these are GEOGRAPHIC LINES from a mark
            const detectedWindDir = predominantHeadings.estimatedWindDir;
            
            analysis.laylines = {
                pointingAngle: bestPointingAngle,
                pointingVMG: bestPointingVMG,
                windDirection: detectedWindDir,
                // These are the HEADINGS of the laylines (lines extending from mark)
                portLaylineHeading: (detectedWindDir + bestPointingAngle) % 360,
                starboardLaylineHeading: (detectedWindDir - bestPointingAngle + 360) % 360,
                // These are the headings YOU sail when ON the layline
                portTackHeading: (detectedWindDir + bestPointingAngle) % 360,
                starboardTackHeading: (detectedWindDir - bestPointingAngle + 360) % 360,
                needsMark: true // Indicates user needs to place mark for actual laylines
            };
            
            // DOWNWIND LAYLINES - Calculate optimal reaching angles for asymmetric
            const downwindData = processedData.filter(r => r.isDownwind && r.speed > 2);
            const downwindByAngle = {};
            
            downwindData.forEach(r => {
                const twa = Math.abs(r.twa_cog);
                const bin = Math.round(twa / 5) * 5; // 5-degree bins
                if (!downwindByAngle[bin]) downwindByAngle[bin] = [];
                downwindByAngle[bin].push(r.vmg);
            });
            
            let bestReachingAngle = 135; // Default for asymmetric
            let bestReachingVMG = 0;
            
            // Find optimal reaching angle (usually 120-150° for asymmetric spinnaker)
            for (let angle = 100; angle <= 170; angle += 5) {
                if (!downwindByAngle[angle] || downwindByAngle[angle].length < 20) continue;
                const avgVMG = downwindByAngle[angle].reduce((a, b) => a + b, 0) / downwindByAngle[angle].length;
                if (Math.abs(avgVMG) > Math.abs(bestReachingVMG)) {
                    bestReachingAngle = angle;
                    bestReachingVMG = avgVMG;
                }
            }
            
            analysis.downwindLaylines = {
                reachingAngle: bestReachingAngle,
                reachingVMG: Math.abs(bestReachingVMG),
                windDirection: detectedWindDir,
                // Downwind laylines extend upwind from leeward mark
                portGybeHeading: (detectedWindDir + bestReachingAngle) % 360,
                starboardGybeHeading: (detectedWindDir - bestReachingAngle + 360) % 360,
                needsMark: true
            };
            
            console.log(`📐 Pointing: Best ${bestPointingAngle}° TWA @ ${bestPointingVMG.toFixed(2)} VMG`);
            console.log(`📐 Reaching: Best ${bestReachingAngle}° TWA @ ${Math.abs(bestReachingVMG).toFixed(2)} VMG downwind`);
            console.log(`⛵ Tack timing: ${tacksOnHeaders} on headers, ${tacksOnLifts} on lifts, ${tacksNeutral} neutral`);

            // STORE RACE RESULTS FOR COMPARISON
            if (selectedRace !== 'all') {
                const raceIdx = parseInt(selectedRace);
                const offset = window._raceKeyOffset || 0;
                const storeKey = String(raceIdx + offset);
                raceResults[storeKey] = {
                    raceId: storeKey,
                    raceNum: raceIdx + offset + 1,
                    label: `Race ${raceIdx + offset + 1}`,
                    standing: races[raceIdx]?.standing ?? null,
                    avgVMG: avgVMG,
                    bestVMG: bestVMGUp,
                    vmgEfficiency: vmgEfficiency,
                    tackEfficiency: analysis.tackEfficiency,
                    gybeEfficiency: analysis.gybeEfficiency,
                    avgUpwindSpeed: avgUpwindSpeed,
                    avgDownwindSpeed: avgDownwindSpeed,
                    optimalHeelUp: bestHeelUp,
                    optimalHeelDown: bestHeelDown,
                    leeway: avgLeeway,
                    tacksCount: tacks.length,
                    gybesCount: gybes.length,
                    avgTackLoss: avgTackLoss,
                    avgGybeLoss: analysis.avgGybeLoss || 0,
                    tackTimingScore: analysis.tackTiming.score,
                    boatHandlingScore: boatHandlingScore,
                    distUpwindNm: typeof distUpwindNm !== 'undefined' ? distUpwindNm : 0,
                    distDownwindNm: typeof distDownwindNm !== 'undefined' ? distDownwindNm : 0,
                    dataPoints: processedData.length,
                    // Downsampled GPS track for Regatta map overlay (every 8th point)
                    track: processedData
                        .filter((_, i) => i % 8 === 0)
                        .filter(r => (r.latitude || r.lat) && (r.longitude || r.lon))
                        .map(r => ({
                            lat: r.latitude || r.lat,
                            lon: r.longitude || r.lon,
                            isUpwind: r.isUpwind
                        }))
                };
            }

            // MULTI-RACE COMPARISON ANALYSIS
            const raceKeys = Object.keys(raceResults);
            if (raceKeys.length > 1) {
                const sortedByVMG = raceKeys.sort((a, b) => raceResults[b].avgVMG - raceResults[a].avgVMG);
                const bestRaceKey = sortedByVMG[0];
                const worstRaceKey = sortedByVMG[sortedByVMG.length - 1];
                
                const improvement = raceKeys.map((key, idx) => ({
                    race: key,
                    order: idx + 1,
                    vmg: raceResults[key].avgVMG,
                    tackEff: raceResults[key].tackEfficiency,
                    handling: raceResults[key].boatHandlingScore
                }));
                
                // Calculate consistency (coefficient of variation)
                const vmgs = raceKeys.map(k => raceResults[k].avgVMG);
                const avgVMGAll = vmgs.reduce((a, b) => a + b, 0) / vmgs.length;
                const stdDev = Math.sqrt(vmgs.map(v => Math.pow(v - avgVMGAll, 2)).reduce((a, b) => a + b) / vmgs.length);
                const consistency = stdDev / avgVMGAll * 100;
                
                analysis.multiRaceComparison = {
                    racesAnalyzed: raceKeys.length,
                    bestRace: {
                        id: bestRaceKey,
                        ...raceResults[bestRaceKey]
                    },
                    worstRace: {
                        id: worstRaceKey,
                        ...raceResults[worstRaceKey]
                    },
                    improvement: improvement,
                    consistency: {
                        vmgVariation: consistency,
                        assessment: consistency < 5 ? 'excellent' : consistency < 10 ? 'good' : consistency < 15 ? 'moderate' : 'inconsistent'
                    },
                    keyDifferences: []
                };
                
                // Identify key differences
                const best = raceResults[bestRaceKey];
                const worst = raceResults[worstRaceKey];
                
                if (best.tackEfficiency - worst.tackEfficiency > 10) {
                    analysis.multiRaceComparison.keyDifferences.push({
                        metric: 'Tack Efficiency',
                        difference: `${(best.tackEfficiency - worst.tackEfficiency).toFixed(0)}% better in best race`,
                        impact: 'High - smoother tacks = more speed retention'
                    });
                }
                
                if (Math.abs(best.optimalHeelUp - worst.optimalHeelUp) > 5) {
                    analysis.multiRaceComparison.keyDifferences.push({
                        metric: 'Heel Angle Consistency',
                        difference: `${best.optimalHeelUp}° vs ${worst.optimalHeelUp}° - ${Math.abs(best.optimalHeelUp - worst.optimalHeelUp).toFixed(0)}° variation`,
                        impact: 'Medium - indicates inconsistent technique or conditions'
                    });
                }
                
                if (best.tackTimingScore - worst.tackTimingScore > 20) {
                    analysis.multiRaceComparison.keyDifferences.push({
                        metric: 'Tack Timing',
                        difference: `${(best.tackTimingScore - worst.tackTimingScore).toFixed(0)}% better wind shift awareness`,
                        impact: 'High - tacking on headers is critical for upwind speed'
                    });
                }
                
                console.log(`🏆 Multi-race: Best=${bestRaceKey} (VMG ${best.avgVMG.toFixed(2)}), Worst=${worstRaceKey} (VMG ${worst.avgVMG.toFixed(2)}), Consistency=${consistency.toFixed(1)}%`);
            }

            console.log("✅ Analysis complete");

            console.log("✅ Analysis complete");
            console.log(`📈 Boat Handling: ${boatHandlingScore.toFixed(0)} (Tack:${tackScore.toFixed(0)} Leeway:${leewayScore.toFixed(0)} Dist:${distScore.toFixed(0)})`);
            console.log(`⬆️ Upwind optimal: ${bestHeelUp}° heel, ${bestTrimUp}° trim`);
            console.log(`⬇️ Downwind optimal: ${bestHeelDown}° heel, ${bestTrimDown}° trim`);
            
            // Hide status and show success
            hideStatus();
            updateAnalyseAllBtn();
            showSuccess(`Analysis complete! ${filteredData.length} points, ${tacks.length} tacks, ${gybes.length} gybes`);

            // Show fleet comparison section
            const fleetSection = document.getElementById('fleetSection');
            if (fleetSection) fleetSection.style.display = 'block';
            updateFleetUI();

            // Auto-expand Analysis section on first load
            expandSidebarSection('analysis');

            // Enable all sidebar sections now that data is loaded
            enableAllSections();

            // Auto-save session to IndexedDB — only on new file upload, not re-analysis
            if (window._pendingSessionSave) {
                window._pendingSessionSave = false;
                saveSessionToDB();
            }
            
            // Show new controls
            document.getElementById('maneuverTuner').style.display = 'block';
            document.getElementById('heelOptions').style.display = 'block';
            document.getElementById('raceDateContainer').style.display = 'block';
            document.getElementById('generatePDF').style.display = 'block';
            document.getElementById('pdfNote').style.display = 'block';
            
            // Set default race date from first timestamp if available
            if (analysis.trackData && analysis.trackData.length > 0) {
                const firstTimestamp = analysis.trackData[0].timestamp;
                if (firstTimestamp) {
                    const raceDate = new Date(firstTimestamp);
                    const dateStr = raceDate.toISOString().split('T')[0];
                    document.getElementById('raceDate').value = dateStr;
                    
                    // Also set in export tab
                    const exportDateInput = document.getElementById('raceDateExport');
                    if (exportDateInput) {
                        exportDateInput.value = dateStr;
                    }
                    
                    // Sync between the two inputs
                    document.getElementById('raceDate').addEventListener('change', function() {
                        const exportInput = document.getElementById('raceDateExport');
                        if (exportInput) exportInput.value = this.value;
                    });
                    
                    if (exportDateInput) {
                        exportDateInput.addEventListener('change', function() {
                            const sidebarInput = document.getElementById('raceDate');
                            if (sidebarInput) sidebarInput.value = this.value;
                        });
                    }
                }
            }
            
            // Test that button is clickable
            setTimeout(() => {
                const pdfBtn = document.getElementById('generatePDF');
                console.log("📄 PDF button element:", pdfBtn);
                console.log("📄 Button visible:", pdfBtn.offsetParent !== null);
                console.log("📄 Button disabled:", pdfBtn.disabled);
            }, 100);
            
            displayResults();
        }

        function generateSuggestions(metrics) {
            const suggestions = [];
            const mode = getWindMode(metrics.avgUpwindSpeed || 0);
            const benchmarks = getActiveBenchmarks();
            const caps = getActiveCapabilities();
            const classLabel = getClassLabel();
            
            const hasBenchmarks = !!benchmarks;

            // Critical issues - leeway
            if (metrics.avgLeeway > 12) {
                const actions = [
                    `Your best VMG heel this session was ${metrics.bestHeelUp}° — fast ${classLabel} sailors target ≤${hasBenchmarks ? benchmarks.heel.easing_trigger : 5}° before easing`,
                ];
                if (caps.hasCenterboard) actions.push('Check centerboard is fully down and undamaged');
                actions.push('Consider bottom condition — fouling adds leeway significantly');
                if (hasBenchmarks) actions.push(benchmarks.main_trim.adjustments);
                suggestions.push({
                    priority: 'CRITICAL', icon: '🚨',
                    title: 'High Leeway Detected',
                    issue: `Your average leeway was ${metrics.avgLeeway.toFixed(1)}°. This suggests significant sideways slip.`,
                    actions
                });
            } else if (metrics.avgLeeway > 8) {
                const actions = [
                    `Your best VMG correlated with ${metrics.bestHeelUp}° heel.${hasBenchmarks ? ` ${classLabel} expert threshold: ${benchmarks.heel.easing_trigger}° before easing` : ''}`,
                    'Verify' + (caps.hasCenterboard ? ' centerboard position and' : '') + ' sail trim balance',
                ];
                if (hasBenchmarks && benchmarks.slot) actions.push(benchmarks.slot.upwind);
                else if (hasBenchmarks && benchmarks.jib_trim) actions.push(benchmarks.jib_trim.model);
                suggestions.push({
                    priority: 'HIGH', icon: '⚠️',
                    title: 'Elevated Leeway',
                    issue: `Average leeway of ${metrics.avgLeeway.toFixed(1)}° is above typical fast ${classLabel} range.`,
                    actions
                });
            }

            // Tack efficiency
            if (metrics.tackEfficiency < 75 && metrics.avgTackLoss > 20) {
                const actions = [];
                if (hasBenchmarks) {
                    actions.push(benchmarks.tacking.technique);
                    actions.push(`${classLabel} roll tack: ` + benchmarks.tacking.roll);
                }
                if (caps.crewCount > 1) {
                    actions.push('Crew should check jib depth and leech position after every tack — consistency is a major differentiator');
                }
                actions.push(mode.id === 'underpowered' ? 'Light air: may need 8-10 tacks per beat — make each one count' : 'Focus on maintaining speed through the maneuver');
                suggestions.push({
                    priority: 'HIGH', icon: '🔄',
                    title: 'Tack Execution — Room to Improve',
                    issue: `${metrics.tackEfficiency.toFixed(0)}% efficiency, ${metrics.avgTackLoss.toFixed(1)}m average loss per tack.`,
                    actions
                });
            } else if (metrics.tackEfficiency < 85) {
                const actions = [];
                if (hasBenchmarks) actions.push(benchmarks.tacking.technique);
                if (caps.crewCount > 1) actions.push('First person off the rail is the trimmer — getting set up properly after each tack matters');
                suggestions.push({
                    priority: 'MEDIUM', icon: '🔄',
                    title: 'Tack Efficiency',
                    issue: `${metrics.tackEfficiency.toFixed(0)}% efficiency, ${metrics.avgTackLoss.toFixed(1)}m loss per tack.`,
                    actions
                });
            }

            // VMG consistency
            if (metrics.vmgEfficiency < 70) {
                const actions = [
                    `Your top 10% VMG shows what you're capable of — the gap suggests inconsistency in setup or conditions`,
                    `Your best VMG heel was ${metrics.bestHeelUp}°.${hasBenchmarks ? ` ${classLabel} fast target: ≤${benchmarks.heel.easing_trigger}° before easing` : ''}`,
                ];
                if (hasBenchmarks) {
                    actions.push(benchmarks.feathering.context);
                    actions.push(mode.id === 'underpowered' ? benchmarks.main_trim.light : benchmarks.main_trim.adjustments);
                }
                suggestions.push({
                    priority: 'HIGH', icon: '📉',
                    title: 'VMG Variability',
                    issue: `Your VMG averaged ${metrics.vmgEfficiency.toFixed(0)}% of your own top performance this session.`,
                    actions
                });
            } else if (metrics.vmgEfficiency < 80) {
                const actions = ['Every luff wrinkle tells a tale — use them as your feedback loop for control adjustments'];
                if (hasBenchmarks) actions.unshift(`${classLabel} feathering: ` + benchmarks.feathering.context);
                suggestions.push({
                    priority: 'MEDIUM', icon: '📊',
                    title: 'VMG Consistency',
                    issue: `${metrics.vmgEfficiency.toFixed(0)}% of your peak VMG — solid but with room to tighten up.`,
                    actions
                });
            }

            // Time in optimal zone
            if (metrics.timeInZone < 40) {
                const actions = [`Your best VMG heel: ${metrics.bestHeelUp}° ±3°.${hasBenchmarks ? ` ${classLabel} expert easing trigger: ${benchmarks.heel.easing_trigger}°` : ''}`];
                actions.push('Constant micro-adjustments rather than big corrections');
                if (hasBenchmarks) actions.push(benchmarks.main_trim.adjustments);
                suggestions.push({
                    priority: 'MEDIUM', icon: '⏱️',
                    title: 'Setup Consistency',
                    issue: `Only ${metrics.timeInZone.toFixed(0)}% of time in your best VMG zone.`,
                    actions
                });
            }

            // Distance efficiency
            if (metrics.distanceEfficiency < 65) {
                const actions = [`Each tack cost ~${metrics.avgTackLoss.toFixed(1)}m on average`];
                if (hasBenchmarks) {
                    actions.push((mode.id === 'underpowered' ? `${classLabel} light air tactics: ` + benchmarks.tactical.light : `${classLabel} tactics: ` + benchmarks.tactical.medium));
                }
                actions.push('Look at your wind shift data — are you tacking on headers and sailing lifts?');
                suggestions.push({
                    priority: 'MEDIUM', icon: '📏',
                    title: 'Course Efficiency',
                    issue: `${metrics.distanceEfficiency.toFixed(0)}% distance efficiency — extra distance sailed.`,
                    actions
                });
            }

            // Port/Starboard balance
            if (Math.abs(metrics.portPercent - metrics.starboardPercent) > 20) {
                const favored = metrics.portPercent > metrics.starboardPercent ? 'port' : 'starboard';
                const pct = Math.max(metrics.portPercent, metrics.starboardPercent).toFixed(0);
                const actions = [
                    'If intentional (persistent shift or geographic feature): good strategy',
                    'If unintentional: may be missing shifts or sailing wrong side of course',
                ];
                if (hasBenchmarks) {
                    actions.push(benchmarks.tactical[mode.id === 'underpowered' ? 'light' : mode.id === 'power_band' ? 'medium' : 'heavy']);
                }
                suggestions.push({
                    priority: 'LOW', icon: '⚖️',
                    title: 'Tack Balance',
                    issue: `${pct}% on ${favored} tack — significant imbalance.`,
                    actions
                });
            }

            // Speed ratio - downwind context
            if (metrics.speedRatio < 1.15) {
                const actions = [];
                if (hasBenchmarks) {
                    actions.push(`${classLabel} downwind VMG: ` + benchmarks.downwind.vmg);
                    actions.push(`${classLabel} main trim downwind: ` + benchmarks.downwind.main);
                    if (benchmarks.slot) actions.push(`${classLabel} three-sail harmony: ` + benchmarks.slot.downwind);
                } else {
                    actions.push('Check downwind sail trim — ease main until luff just starts to curl');
                }
                suggestions.push({
                    priority: 'LOW', icon: '🏃',
                    title: 'Downwind Speed',
                    issue: `Speed ratio ${metrics.speedRatio.toFixed(2)}x — not gaining much downwind vs. upwind.`,
                    actions
                });
            }

            // Good performance
            if (metrics.boatHandlingScore >= 80) {
                const actions = [
                    'Solid fundamentals — focus on marginal gains',
                    'Compare your polar to class targets session over session',
                ];
                if (hasBenchmarks) actions.push(benchmarks.feathering.context);
                suggestions.push({
                    priority: 'GOOD', icon: '🏆',
                    title: 'Strong Session',
                    issue: 'Boat handling score of ' + metrics.boatHandlingScore.toFixed(0) + '/100.',
                    actions
                });
            }

            return suggestions.sort((a, b) => {
                const priority = { 'CRITICAL': 0, 'HIGH': 1, 'MEDIUM': 2, 'LOW': 3, 'GOOD': 4 };
                return priority[a.priority] - priority[b.priority];
            });
        }

        // ============================================================
        // REGATTA TAB — multi-race comparison dashboard
        // ============================================================
        function renderRegattaTab() {
            const container = document.getElementById('regattaContainer');
            if (!container) return;

            const keys = Object.keys(raceResults).sort((a, b) => parseInt(a) - parseInt(b));

            if (keys.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 text-gray-400">
                        <div class="text-5xl mb-4">🏆</div>
                        <p class="text-lg font-semibold mb-2">No race data yet</p>
                        <p class="text-sm">Select each race in the sidebar and click Analyse. Come back here after 2+ races.</p>
                    </div>`;
                return;
            }

            // ── Helpers ───────────────────────────────────────────────
            const fmt = (v, d=2) => (v !== null && v !== undefined && !isNaN(v)) ? Number(v).toFixed(d) : '—';
            const scoreColor = v => {
                if (v === null || v === undefined || isNaN(v)) return '#64748B';
                if (v >= 80) return '#22C55E';
                if (v >= 65) return '#F59E0B';
                return '#EF4444';
            };
            const ordinal = n => {
                if (!n) return '—';
                const s = ['th','st','nd','rd'], v = n % 100;
                return n + (s[(v-20)%10] || s[v] || s[0]);
            };

            const rows = keys.map(k => raceResults[k]);
            const vmgs = rows.map(r => r.avgVMG).filter(v => v > 0);
            const bestVMG  = Math.max(...vmgs);
            const worstVMG = Math.min(...vmgs);
            const avgVMGAll = vmgs.reduce((a,b) => a+b, 0) / vmgs.length;
            const stdDev = Math.sqrt(vmgs.map(v => Math.pow(v-avgVMGAll,2)).reduce((a,b)=>a+b,0) / vmgs.length);
            const consistency = avgVMGAll > 0 ? (stdDev/avgVMGAll*100) : 0;
            const bestRow = rows.find(r => r.avgVMG === bestVMG);
            const hasStandings = rows.some(r => r.standing !== null);
            const totalUpwind   = rows.reduce((s,r) => s+(r.distUpwindNm||0), 0);
            const totalDownwind = rows.reduce((s,r) => s+(r.distDownwindNm||0), 0);
            const consistencyLabel = consistency < 5 ? 'Excellent' : consistency < 10 ? 'Good' : consistency < 15 ? 'Moderate' : 'Inconsistent';
            const consistencyColor = consistency < 5 ? '#22C55E' : consistency < 10 ? '#F59E0B' : '#EF4444';

            // ── Sparkline SVG ─────────────────────────────────────────
            const sparkW = 300, sparkH = 64, sparkPad = 10;
            const sparkPoints = rows.map((r, i) => {
                const x = sparkPad + (i / Math.max(rows.length-1,1)) * (sparkW - sparkPad*2);
                const range = bestVMG - worstVMG || 0.1;
                const y = sparkH - sparkPad - ((r.avgVMG - worstVMG) / range) * (sparkH - sparkPad*2);
                return [x, y];
            });
            const polyline = sparkPoints.map(p => p.join(',')).join(' ');
            const sparkSVG = `
                <svg viewBox="0 0 ${sparkW} ${sparkH}" style="width:100%;max-width:${sparkW}px;height:${sparkH}px;">
                    <polyline points="${polyline}" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linejoin="round"/>
                    ${sparkPoints.map((p,i) => `<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${rows[i].avgVMG===bestVMG?'#22C55E':'#38BDF8'}"/>`).join('')}
                    ${sparkPoints.map((p,i) => `<text x="${p[0]}" y="${sparkH}" text-anchor="middle" font-size="9" fill="#64748B">R${rows[i].raceNum}</text>`).join('')}
                </svg>`;

            // ── Race colors for GPS overlay ───────────────────────────
            const RACE_COLORS = ['#38BDF8','#FB923C','#22C55E','#A78BFA','#F472B6','#FBBF24','#34D399','#F87171','#60A5FA','#C084FC'];

            // ── Metric columns ────────────────────────────────────────
            const metricCols = [
                { label: 'Place',            fn: r => ordinal(r.standing),                                                            raw: r => r.standing,          higherBetter: false },
                { label: 'Boat Handling',    fn: r => `<span style="color:${scoreColor(r.boatHandlingScore)}">${fmt(r.boatHandlingScore,0)}</span>`, raw: r => r.boatHandlingScore, higherBetter: true  },
                { label: 'Avg VMG',          fn: r => `${fmt(r.avgVMG)} kts`,                                                         raw: r => r.avgVMG,            higherBetter: true  },
                { label: 'VMG Efficiency',   fn: r => `${fmt(r.vmgEfficiency,0)}%`,                                                   raw: r => r.vmgEfficiency,     higherBetter: true  },
                { label: 'Upwind Speed',     fn: r => `${fmt(r.avgUpwindSpeed)} kts`,                                                 raw: r => r.avgUpwindSpeed,    higherBetter: true  },
                { label: 'Downwind Speed',   fn: r => `${fmt(r.avgDownwindSpeed)} kts`,                                               raw: r => r.avgDownwindSpeed,  higherBetter: true  },
                { label: 'Upwind Dist',      fn: r => `${fmt(r.distUpwindNm,2)} nm`,                                                  raw: r => r.distUpwindNm,      higherBetter: null  },
                { label: 'Downwind Dist',    fn: r => `${fmt(r.distDownwindNm,2)} nm`,                                                raw: r => r.distDownwindNm,    higherBetter: null  },
                { label: 'Best VMG ▲',    fn: r => `${fmt(r.optimalHeelUp,0)}°`,                                                   raw: r => r.optimalHeelUp,     higherBetter: null  },
                { label: 'Best VMG ▼',  fn: r => `${fmt(r.optimalHeelDown,0)}°`,                                                 raw: r => r.optimalHeelDown,   higherBetter: null  },
                { label: 'Tack Efficiency',  fn: r => r.tackEfficiency ? `${fmt(r.tackEfficiency,0)}%` : '—',                         raw: r => r.tackEfficiency,    higherBetter: true  },
                { label: 'Gybe Efficiency',  fn: r => r.gybeEfficiency ? `${fmt(r.gybeEfficiency,0)}%` : '—',                        raw: r => r.gybeEfficiency,    higherBetter: true  },
                { label: 'Avg Tack Loss',    fn: r => r.avgTackLoss ? `${fmt(r.avgTackLoss,1)}m` : '—',                              raw: r => r.avgTackLoss,       higherBetter: false },
                { label: 'Avg Gybe Loss',    fn: r => r.avgGybeLoss ? `${fmt(r.avgGybeLoss,1)}m` : '—',                              raw: r => r.avgGybeLoss,       higherBetter: false },
                { label: 'Avg Leeway',       fn: r => `${fmt(r.leeway,1)}°`,                                                          raw: r => r.leeway,            higherBetter: false },
                { label: 'Tacks',            fn: r => r.tacksCount ?? '—',                                                            raw: r => r.tacksCount,        higherBetter: null  },
                { label: 'Gybes',            fn: r => r.gybesCount ?? '—',                                                            raw: r => r.gybesCount,        higherBetter: null  },
            ];

            // Per-row best/worst highlighting
            const rowHighlights = metricCols.map(col => {
                const vals = rows.map(r => col.raw(r)).filter(v => v !== null && v !== undefined && !isNaN(v) && v > 0);
                if (vals.length === 0) return { best: null, worst: null };
                const best  = col.higherBetter === true  ? Math.max(...vals) : col.higherBetter === false ? Math.min(...vals) : null;
                const worst = col.higherBetter === true  ? Math.min(...vals) : col.higherBetter === false ? Math.max(...vals) : null;
                return { best, worst };
            });

            const thStyle = 'padding:0.5rem 0.75rem; text-align:center; font-size:0.72rem; font-weight:700; border-bottom:1px solid #1E3A5F; white-space:nowrap;';
            const tableHeader = `
                <th style="${thStyle} text-align:left; color:#64748B; text-transform:uppercase; letter-spacing:0.08em;">Metric</th>
                ${rows.map((r,i) => `<th style="${thStyle} color:${RACE_COLORS[i % RACE_COLORS.length]};">
                    ${r.label}${r.standing ? `<br/><span style="font-size:0.65rem;color:#94A3B8;">${ordinal(r.standing)} place</span>` : ''}
                </th>`).join('')}`;

            const tableRows = metricCols.map((col, ci) => {
                const { best, worst } = rowHighlights[ci];
                const cells = rows.map(r => {
                    const rawVal = col.raw(r);
                    const isBest  = best  !== null && rawVal === best;
                    const isWorst = worst !== null && rawVal === worst && rows.length > 1;
                    const bg = isBest ? 'rgba(34,197,94,0.08)' : isWorst ? 'rgba(239,68,68,0.06)' : 'transparent';
                    const color = isBest ? '#22C55E' : isWorst ? '#EF4444' : '#E2E8F0';
                    return `<td style="padding:0.5rem 0.75rem; text-align:center; font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:${isBest?700:400}; color:${color}; background:${bg}; border-bottom:1px solid rgba(30,58,95,0.4); white-space:nowrap;">${col.fn(r)}</td>`;
                }).join('');
                const labelStyle = 'padding:0.5rem 0.75rem; font-size:0.72rem; color:#64748B; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid rgba(30,58,95,0.4); white-space:nowrap;';
                return `<tr><td style="${labelStyle}">${col.label}</td>${cells}</tr>`;
            }).join('');

            // ── Insights ──────────────────────────────────────────────
            const insights = [];
            const consistencyInsightColor = consistency < 5 ? '#22C55E' : consistency < 10 ? '#F59E0B' : '#EF4444';
            insights.push({ color: consistencyInsightColor, title: 'VMG Consistency',
                text: `<strong>${consistencyLabel}</strong> — ${consistency.toFixed(1)}% variation across ${rows.length} races. ${
                    consistency < 10 ? 'Repeatable style — gains come from refinement.' :
                    'High variation suggests changing conditions or technique drift. Compare your best and worst race rows above.'
                }` });

            if (rows.length >= 3) {
                const half = Math.floor(rows.length/2);
                const avg1 = rows.slice(0, half).reduce((s,r) => s+r.avgVMG, 0) / half;
                const avg2 = rows.slice(half).reduce((s,r) => s+r.avgVMG, 0) / (rows.length - half);
                const trend = avg2 - avg1;
                insights.push({ color: trend > 0.05 ? '#22C55E' : trend < -0.05 ? '#EF4444' : '#64748B',
                    title: 'Performance Trend',
                    text: trend > 0.05
                        ? `VMG improved <strong>${trend.toFixed(2)} kts</strong> from early to late races — you dialled in as the day went on.`
                        : trend < -0.05
                        ? `VMG dropped <strong>${Math.abs(trend).toFixed(2)} kts</strong> later in the day. Fatigue or shifting conditions? Check tack efficiency in late races.`
                        : 'Performance was steady throughout — consistent pacing.' });
            }

            const tackEffs = rows.map(r => r.tackEfficiency).filter(v => v);
            if (tackEffs.length >= 2) {
                const drift = tackEffs[tackEffs.length-1] - tackEffs[0];
                if (Math.abs(drift) > 5) insights.push({ color: drift > 0 ? '#22C55E' : '#EF4444', title: 'Tack Quality Trend',
                    text: drift > 0
                        ? `Tack efficiency improved ${drift.toFixed(0)}% from Race 1 to Race ${rows.length} — good adaptation.`
                        : `Tack efficiency dropped ${Math.abs(drift).toFixed(0)}% by the final races — likely fatigue. Focus on technique in late races.` });
            }

            // Heel consistency
            const heels = rows.map(r => r.optimalHeelUp).filter(v => v > 0);
            if (heels.length >= 2) {
                const heelRange = Math.max(...heels) - Math.min(...heels);
                if (heelRange >= 4) insights.push({ color: '#F59E0B', title: 'Heel Angle Variation',
                    text: `Optimal upwind heel varied <strong>${heelRange}°</strong> across races (${Math.min(...heels)}°–${Math.max(...heels)}°). This may reflect changing wind strength rather than inconsistent technique — check if the windier races match the flatter heel readings.` });
            }

            if (totalUpwind > 0 && totalDownwind > 0) {
                const ratio = totalDownwind / totalUpwind;
                insights.push({ color: '#64748B', title: 'Course Profile',
                    text: `Across all races: <strong>${totalUpwind.toFixed(2)} nm upwind</strong>, <strong>${totalDownwind.toFixed(2)} nm downwind</strong>. ${
                        ratio > 0.8 ? 'Balanced course.' : 'Predominantly upwind — VMG and tack execution are the dominant factors.' }` });
            }

            if (hasStandings && rows.length >= 2) {
                const ws = rows.filter(r => r.standing !== null && r.avgVMG > 0);
                if (ws.length >= 2) {
                    const bestResult = ws.reduce((a,b) => a.standing < b.standing ? a : b);
                    const bestVMGR   = ws.reduce((a,b) => a.avgVMG   > b.avgVMG   ? a : b);
                    if (bestResult.raceId !== bestVMGR.raceId) {
                        insights.push({ color: '#F59E0B', title: 'Speed vs. Result Gap',
                            text: `Best VMG was ${bestVMGR.label} but best finish was ${bestResult.label} (${ordinal(bestResult.standing)}). <strong>Boat speed isn't the whole story</strong> — tactics, starts, or current may explain the gap.` });
                    } else {
                        insights.push({ color: '#22C55E', title: 'Speed = Results',
                            text: `Fastest race (${bestResult.label}) was also your best finish (${ordinal(bestResult.standing)}). Speed and results are aligned.` });
                    }
                }
            }

            // ── Build HTML ────────────────────────────────────────────
            container.innerHTML = `
                <!-- SUMMARY CARDS -->
                <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:2rem;">
                    ${[
                        { label:'Races Analysed', val: rows.length, unit:'', color:'#38BDF8' },
                        { label:'Best VMG',  val: fmt(bestVMG), unit:'kts', color:'#22C55E', sub: bestRow?.label },
                        { label:'Consistency', val: consistency.toFixed(1)+'%', unit:'', color: consistencyColor, sub: consistencyLabel },
                        { label:'Total Upwind',   val: totalUpwind.toFixed(2),   unit:'nm', color:'#38BDF8' },
                        { label:'Total Downwind', val: totalDownwind.toFixed(2), unit:'nm', color:'#818CF8' },
                    ].map(c => `
                        <div style="background:#112240; border:1px solid #1E3A5F; border-radius:10px; padding:1rem 1.25rem;">
                            <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:#64748B; margin-bottom:0.5rem;">${c.label}</div>
                            <div style="font-family:'Barlow Condensed',sans-serif; font-size:1.9rem; font-weight:700; color:${c.color};">${c.val}${c.unit ? ` <span style="font-size:0.85rem;color:#64748B;">${c.unit}</span>` : ''}</div>
                            ${c.sub ? `<div style="font-size:0.72rem; color:#64748B;">${c.sub}</div>` : ''}
                        </div>`).join('')}
                </div>

                <!-- VMG TREND SPARKLINE -->
                <div style="background:#112240; border:1px solid #1E3A5F; border-radius:10px; padding:1.25rem; margin-bottom:2rem;">
                    <div style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#64748B; margin-bottom:1rem; border-bottom:1px solid #1E3A5F; padding-bottom:0.5rem;">VMG Trend</div>
                    ${sparkSVG}
                    <div style="font-size:0.72rem; color:#64748B; margin-top:0.4rem;">Green dot = best race</div>
                </div>

                <!-- GPS OVERLAY MAP -->
                <div style="background:#112240; border:1px solid #1E3A5F; border-radius:10px; padding:1.25rem; margin-bottom:2rem;">
                    <div style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#64748B; margin-bottom:0.75rem; border-bottom:1px solid #1E3A5F; padding-bottom:0.5rem;">GPS Track Overlay — All Races</div>
                    <div style="display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:0.75rem; font-size:0.8rem;">
                        ${rows.map((r,i) => `
                            <span style="display:flex; align-items:center; gap:0.35rem;">
                                <span style="width:14px;height:4px;border-radius:2px;background:${RACE_COLORS[i%RACE_COLORS.length]};display:inline-block;"></span>
                                ${r.label}${r.standing ? ` (${ordinal(r.standing)})` : ''}
                            </span>`).join('')}
                    </div>
                    <canvas id="regattaMapCanvas" style="width:100%; height:420px; border-radius:8px; background:#060D1A; display:block; cursor:grab;"></canvas>
                    <div style="font-size:0.7rem; color:#64748B; margin-top:0.4rem;">Scroll to zoom • Drag to pan</div>
                </div>

                <!-- COMPARISON TABLE -->
                <div style="background:#112240; border:1px solid #1E3A5F; border-radius:10px; padding:1.25rem; margin-bottom:2rem; overflow-x:auto;">
                    <div style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#64748B; margin-bottom:1rem; border-bottom:1px solid #1E3A5F; padding-bottom:0.5rem;">
                        Race-by-Race Metrics &nbsp;<span style="color:#22C55E; font-weight:400; text-transform:none;">green = best &nbsp;</span><span style="color:#EF4444; font-weight:400; text-transform:none;">red = worst</span>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                        <thead><tr>${tableHeader}</tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>

                <!-- INSIGHTS -->
                <div style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#64748B; margin-bottom:1rem; border-bottom:1px solid #1E3A5F; padding-bottom:0.5rem;">Coaching Insights</div>
                <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; margin-bottom:2rem;">
                    ${insights.map(ins => `
                        <div style="background:#112240; border-radius:10px; padding:1.25rem; border-left:3px solid ${ins.color};">
                            <div style="font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; color:#64748B;">${ins.title}</div>
                            <div style="font-size:0.875rem; line-height:1.5; color:#E2E8F0;">${ins.text}</div>
                        </div>`).join('')}
                </div>
                ${rows.length < 2 ? `<div style="text-align:center; padding:1.5rem; background:#0D1B2E; border-radius:8px; color:#64748B; font-size:0.875rem;">Analyse at least 2 races to unlock trend analysis and insights.</div>` : ''}
            `;

            // ── Draw GPS overlay after DOM renders ────────────────────
            setTimeout(() => drawRegattaMap(rows, RACE_COLORS), 50);
        }

        // ── Regatta GPS map (zoomable canvas) ────────────────────────
        let _regattaMapState = { zoom:1, panX:0, panY:0, rows:[], colors:[] };

        function drawRegattaMap(rows, colors) {
            const canvas = document.getElementById('regattaMapCanvas');
            if (!canvas) return;

            // Collect all GPS points across all races
            const allPts = rows.flatMap(r => r.track || []);
            if (allPts.length < 10) {
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
                ctx.fillStyle = '#060D1A'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#64748B'; ctx.font = '14px Barlow,sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No GPS track data — re-analyse races to generate tracks', canvas.width/2, canvas.height/2);
                return;
            }

            const lats = allPts.map(p => p.lat).filter(Boolean);
            const lons = allPts.map(p => p.lon).filter(Boolean);
            _regattaMapState = {
                zoom:1, panX:0, panY:0, rows, colors,
                minLat: Math.min(...lats), maxLat: Math.max(...lats),
                minLon: Math.min(...lons), maxLon: Math.max(...lons)
            };

            // Clear old listeners by cloning
            const newCanvas = canvas.cloneNode(true);
            canvas.parentNode.replaceChild(newCanvas, canvas);
            const c = document.getElementById('regattaMapCanvas');
            c.style.cursor = 'grab';

            c.addEventListener('wheel', e => {
                e.preventDefault();
                _regattaMapState.zoom = Math.max(0.5, Math.min(20, _regattaMapState.zoom * (e.deltaY < 0 ? 1.15 : 0.87)));
                _drawRegattaCanvas();
            }, { passive: false });

            let drag = false, lx = 0, ly = 0;
            c.addEventListener('mousedown', e => { drag=true; lx=e.clientX; ly=e.clientY; c.style.cursor='grabbing'; });
            c.addEventListener('mousemove', e => {
                if (!drag) return;
                _regattaMapState.panX += e.clientX-lx; _regattaMapState.panY += e.clientY-ly;
                lx=e.clientX; ly=e.clientY; _drawRegattaCanvas();
            });
            c.addEventListener('mouseup',    () => { drag=false; c.style.cursor='grab'; });
            c.addEventListener('mouseleave', () => { drag=false; c.style.cursor='grab'; });

            _drawRegattaCanvas();
        }

        function _drawRegattaCanvas() {
            const canvas = document.getElementById('regattaMapCanvas');
            if (!canvas) return;
            const { zoom, panX, panY, rows, colors, minLat, maxLat, minLon, maxLon } = _regattaMapState;
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.offsetWidth, H = canvas.offsetHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const pad = 40;
            const bsX = (W-pad*2) / (maxLon-minLon || 0.001);
            const bsY = (H-pad*2) / (maxLat-minLat || 0.001);
            const bs  = Math.min(bsX, bsY);
            const twW = (maxLon-minLon)*bs, twH = (maxLat-minLat)*bs;
            const ox = (W-twW)/2, oy = (H-twH)/2;
            const sc = bs * zoom;

            const toXY = (lat, lon) => [
                ox + (lon-minLon)*sc + panX*zoom - (zoom-1)*(W/2),
                H - oy - (lat-minLat)*sc - panY*zoom + (zoom-1)*(H/2)
            ];

            // Background + grid
            ctx.fillStyle = '#060D1A'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = 'rgba(14,36,64,0.5)'; ctx.lineWidth=0.5;
            for (let gx=0; gx<W; gx+=40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
            for (let gy=0; gy<H; gy+=40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

            // Draw each race track
            rows.forEach((r, ri) => {
                const track = r.track || [];
                if (track.length < 2) return;
                const color = colors[ri % colors.length];
                ctx.strokeStyle = color;
                ctx.lineWidth = Math.max(1.5, 2*Math.min(zoom,3));
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                let started = false;
                track.forEach(pt => {
                    const [x,y] = toXY(pt.lat, pt.lon);
                    if (x < -100 || x > W+100 || y < -100 || y > H+100) { started=false; return; }
                    if (!started) { ctx.moveTo(x,y); started=true; }
                    else ctx.lineTo(x,y);
                });
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Start dot + label
                if (track[0]) {
                    const [sx,sy] = toXY(track[0].lat, track[0].lon);
                    ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2);
                    ctx.fillStyle = color; ctx.fill();
                    ctx.strokeStyle='#060D1A'; ctx.lineWidth=1.5; ctx.stroke();
                    ctx.fillStyle = color;
                    ctx.font = `bold ${Math.min(12,9+zoom)}px Barlow,sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.fillText(r.label, sx+8, sy+4);
                }
            });

            // Zoom hint
            ctx.fillStyle='rgba(100,116,139,0.5)'; ctx.font='9px sans-serif'; ctx.textAlign='right';
            ctx.fillText(`scroll to zoom • drag to pan • ${zoom.toFixed(1)}x`, W-8, H-6);
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        function computeFleetBoatAnalysis(csvData) {
            if (!csvData || csvData.length < 10) return null;

            // ---- Step 1: Apply same race time filter as primary boat ----
            let filteredData = csvData;
            if (selectedRace !== 'all' && races && races[parseInt(selectedRace)]) {
                const race = races[parseInt(selectedRace)];
                filteredData = csvData.filter(row => {
                    const ts = row.timestamp || row.time;
                    if (!ts) return false;
                    try {
                        const date = new Date(ts);
                        const h = String(date.getHours()).padStart(2,'0');
                        const m = String(date.getMinutes()).padStart(2,'0');
                        const s = String(date.getSeconds()).padStart(2,'0');
                        const timeStr = `${h}:${m}:${s}`;
                        return timeStr >= race.start && timeStr <= race.end;
                    } catch(e) { return false; }
                });
            }
            if (filteredData.length < 10) return null;

            // ---- Step 2: Use same wind direction as primary boat ----
            const wd = windDir || 0;

            // ---- Step 3: Same processedData pipeline as analyzeData() ----
            const processedData = filteredData.map((row, idx) => {
                const speed   = parseFloat(row.sog_kts || row.sog || row.speed || 0);
                const heading = parseFloat(row.hdg_true || row.heading || row.hdg || 0);
                const heel    = parseFloat(row.heel || 0);
                const trim    = parseFloat(row.trim || row.pitch || 0);
                const cog     = parseFloat(row.cog || heading);
                let rawTWA = (cog - wd + 180) % 360 - 180;
                const tackSign = Math.sign(rawTWA) || 1;
                const twa_cog = rawTWA + ((Math.abs(heel) * 0.1) * tackSign);
                let leeway = cog - heading;
                if (leeway > 180) leeway -= 360;
                if (leeway < -180) leeway += 360;
                const isUpwind = Math.abs(twa_cog) < 90;
                const vmg = speed * Math.cos(twa_cog * Math.PI / 180);
                let deltaHeading = 0;
                if (idx > 0) {
                    const prev = parseFloat(filteredData[idx-1].hdg_true || filteredData[idx-1].heading || 0);
                    deltaHeading = heading - prev;
                    if (deltaHeading > 180) deltaHeading -= 360;
                    if (deltaHeading < -180) deltaHeading += 360;
                }
                return {
                    speed, heading, cog, heel, trim, twa_cog, vmg,
                    leeway: Math.abs(leeway), isUpwind,
                    deltaHeading, rot: Math.abs(deltaHeading),
                    lat: row.latitude || row.lat,
                    lon: row.longitude || row.lon,
                    latitude: row.latitude || row.lat,
                    longitude: row.longitude || row.lon,
                    timestamp: row.timestamp
                };
            });

            // ---- Step 4: Same upwind/downwind split ----
            const upwind   = processedData.filter(r => r.isUpwind  && r.speed > 4.5 && Math.abs(r.heel) < 25 && Math.abs(r.trim) < 15);
            const downwind = processedData.filter(r => !r.isUpwind && r.speed > 4.5 && Math.abs(r.heel) < 25 && Math.abs(r.trim) < 15);

            const avgUpwindSpeed   = upwind.length   > 5 ? upwind.reduce((s,r)=>s+r.speed,0)/upwind.length   : 0;
            const avgDownwindSpeed = downwind.length > 5 ? downwind.reduce((s,r)=>s+r.speed,0)/downwind.length : 0;
            const avgVMG           = upwind.length   > 5 ? upwind.reduce((s,r)=>s+r.vmg,0)/upwind.length      : 0;

            // ---- Step 5: Best VMG heel (same bin method) ----
            const heelBins = {};
            upwind.forEach(r => {
                const bin = Math.round(Math.abs(r.heel) / 2) * 2;
                if (!heelBins[bin]) heelBins[bin] = [];
                heelBins[bin].push(r.vmg);
            });
            let bestHeelUp = 0, bestVMGHeelScore = -999;
            for (const [heel, vmgs] of Object.entries(heelBins)) {
                if (vmgs.length < 20) continue;
                const sorted = vmgs.sort((a,b) => b-a);
                const p90 = sorted[Math.floor(sorted.length * 0.1)];
                if (p90 > bestVMGHeelScore) { bestVMGHeelScore = p90; bestHeelUp = parseInt(heel); }
            }

            // ---- Step 6: Hz-normalized maneuver detection ----
            // Detect sample rate from timestamps so timeWindow (which is an index count
            // tuned for the primary boat's Hz) is scaled correctly for this boat.
            let hzEstimate = 5; // default: assume 5Hz like primary
            const tsRows = processedData.filter(r => r.timestamp).slice(0, 20);
            if (tsRows.length >= 2) {
                const intervals = [];
                for (let i = 1; i < tsRows.length; i++) {
                    const dt = (new Date(tsRows[i].timestamp) - new Date(tsRows[i-1].timestamp)) / 1000;
                    if (dt > 0 && dt < 5) intervals.push(dt);
                }
                if (intervals.length > 0) {
                    const medianInterval = intervals.sort((a,b)=>a-b)[Math.floor(intervals.length/2)];
                    hzEstimate = Math.round(1 / medianInterval);
                    if (hzEstimate < 1) hzEstimate = 1;
                    console.log(`🕐 Fleet boat Hz detected: ${hzEstimate} (interval ${medianInterval.toFixed(3)}s)`);
                }
            }

            // Primary boat reference Hz (maneuverParams.timeWindow is tuned for this)
            const primaryHz = 5;
            const mp = maneuverParams || { minAngle: 60, timeWindow: 8, minSpeed: 3 };
            // Scale timeWindow to match same real-time duration for this boat's Hz
            const scaledWindow = Math.max(2, Math.round(mp.timeWindow * (hzEstimate / primaryHz)));
            // Real seconds spanned by the window — used for accurate distance loss calc
            const windowSeconds = scaledWindow / hzEstimate;
            // Entry/exit averaging windows also scaled
            const avgWindow = Math.max(1, Math.round(3 * (hzEstimate / primaryHz)));

            // Skip forward ~15 real seconds to avoid double-counting same tack
            const tackSkipFleet = Math.max(scaledWindow, Math.round(15 * hzEstimate));
            const maneuvers = [];
            for (let i = scaledWindow; i < processedData.length - scaledWindow; i++) {
                if (processedData[i].speed < mp.minSpeed) continue;
                const prevCOG = processedData[i - scaledWindow].cog;
                const nextCOG = processedData[i + scaledWindow].cog;
                let cogChange = Math.abs(nextCOG - prevCOG);
                if (cogChange > 180) cogChange = 360 - cogChange;
                if (cogChange >= mp.minAngle) {
                    const entrySpeed = processedData.slice(i - avgWindow, i).reduce((s,r)=>s+r.speed,0) / avgWindow;
                    const exitSpeed  = processedData.slice(i + 1, i + 1 + avgWindow).reduce((s,r)=>s+r.speed,0) / avgWindow;
                    const speedLoss  = entrySpeed - exitSpeed;
                    const timeLost     = speedLoss > 0 ? (windowSeconds * 2) * (speedLoss / entrySpeed) : 0;
                    const distanceLost = (entrySpeed * 0.514444) * timeLost;
                    const efficiency   = exitSpeed > 0 ? (exitSpeed / entrySpeed) * 100 : 0;
                    const entryTWA = Math.abs(processedData[i - scaledWindow].twa_cog);
                    const exitTWA  = Math.abs(processedData[i + scaledWindow].twa_cog);
                    const avgTWAm  = (entryTWA + exitTWA) / 2;
                    maneuvers.push({
                        type: avgTWAm < 90 ? 'Tack' : 'Gybe',
                        distanceLost: Math.max(0, distanceLost),
                        efficiency,
                        lat: processedData[i].lat,
                        lon: processedData[i].lon
                    });
                    i += tackSkipFleet;
                }
            }
            const tacks = maneuvers.filter(m => m.type === 'Tack');
            const gybes = maneuvers.filter(m => m.type === 'Gybe');
            const avgTackLoss = tacks.length > 0 ? tacks.reduce((s,t)=>s+t.distanceLost,0)/tacks.length : 0;
            const tackEfficiency = tacks.length > 0 ? tacks.reduce((s,t)=>s+t.efficiency,0)/tacks.length : 0;

            // ---- Step 7: Extra metrics (leeway, pointing, speeds, VMG efficiency) ----
            const avgLeeway = upwind.length > 5 ? upwind.reduce((s,r)=>s+r.leeway,0)/upwind.length : 0;

            // Best pointing = tightest TWA while making good VMG
            const goodUpwind = upwind.filter(r => r.vmg > 3 && Math.abs(r.twa_cog) >= 25);
            const bestPointing = goodUpwind.length > 0 ? Math.min(...goodUpwind.map(r => Math.abs(r.twa_cog))) : 0;

            // Best VMG (p5 of upwind VMGs)
            const sortedVMG = upwind.map(r => r.vmg).sort((a,b) => b-a);
            const bestVMGUp = sortedVMG.length > 0 ? sortedVMG[Math.floor(sortedVMG.length * 0.05)] : 0;
            const avgVMGval = avgVMG;
            const vmgEfficiency = bestVMGUp > 0 ? (avgVMGval / bestVMGUp) * 100 : 0;

            // Max speed
            const allSpeeds = processedData.filter(r => r.speed > 1).map(r => r.speed);
            const maxSpeed = allSpeeds.length > 0 ? Math.max(...allSpeeds) : 0;

            // Gybe stats (gybes already declared above)
            const avgGybeLoss = gybes.length > 0 ? gybes.reduce((s,g)=>s+g.distanceLost,0)/gybes.length : 0;
            const gybeEfficiency = gybes.length > 0 ? gybes.reduce((s,g)=>s+g.efficiency,0)/gybes.length : 0;

            // ---- Step 8: Distance + handling score ----
            let totalDist = 0;
            for (let i = 0; i < processedData.length-1; i++) {
                const p1 = processedData[i], p2 = processedData[i+1];
                if (p1.lat && p1.lon && p2.lat && p2.lon)
                    totalDist += haversineDistance(p1.lat, p1.lon, p2.lat, p2.lon);
            }
            const tackScore    = Math.max(0, Math.min(100, 100 - (avgTackLoss * 2)));
            const leewayScore  = Math.max(0, Math.min(100, 100 - (avgLeeway * 5)));
            const distScore    = Math.min(100, vmgEfficiency);
            const boatHandlingScore = (tackScore * 0.3 + leewayScore * 0.4 + distScore * 0.3);

            // Maneuver positions for map dots
            const maneuverPts = maneuvers.filter(m => m.lat && m.lon);

            return {
                avgUpwindSpeed,
                avgDownwindSpeed,
                avgVMG,
                avgHeel: bestHeelUp,
                tacksCount: tacks.length,
                avgTackLoss,
                tackEfficiency,
                distanceSailed: totalDist / 1852,
                boatHandlingScore,
                // New metrics
                bestVMGUp,
                vmgEfficiency,
                maxSpeed,
                bestPointing,
                avgLeeway,
                gybeCount: gybes.length,
                avgGybeLoss,
                gybeEfficiency,
                maneuverPts,
                trackData: processedData
            };
        }

        function buildFleetScoreCards(allBoats) {
            const scoreColor = v => {
                if (v === null || v === undefined || isNaN(v)) return '#64748B';
                if (v >= 80) return '#22C55E';
                if (v >= 65) return '#F59E0B';
                return '#EF4444';
            };
            const metrics = [
                { label: 'Boat Handling',    key: 'boatHandlingScore' },
                { label: 'VMG Efficiency',   key: 'vmgEfficiency',   unit: '%' },
                { label: 'Tack Efficiency',  key: 'tackEfficiency',  unit: '%' },
                { label: 'Gybe Efficiency',  key: 'gybeEfficiency',  unit: '%' },
            ];
            const cards = metrics.map(m => {
                const vals = allBoats.map(b => b.analysis ? b.analysis[m.key] : null);
                const rows = allBoats.map((b, i) => {
                    const v = vals[i];
                    const pct = (v !== null && v !== undefined) ? Math.min(100, v) : 0;
                    const trackColors = FLEET_TRACK_COLORS[i % FLEET_TRACK_COLORS.length];
                    return `<div style="margin-bottom:6px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
                            <span style="font-size:0.75rem;color:${trackColors.up};font-weight:600;">${b.label}</span>
                            <span style="font-size:0.8rem;font-weight:700;color:${scoreColor(v)};">${v !== null && v !== undefined ? Math.round(v) : '—'}${m.unit||''}</span>
                        </div>
                        <div style="height:5px;background:#1F2937;border-radius:3px;overflow:hidden;">
                            <div style="height:100%;width:${pct}%;background:${trackColors.up};border-radius:3px;transition:width 0.4s;"></div>
                        </div>
                    </div>`;
                }).join('');
                return `<div style="background:#1F2937;border:1px solid #374151;border-radius:10px;padding:14px;">
                    <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#4B5563;margin-bottom:10px;">${m.label}</div>
                    ${rows}
                </div>`;
            }).join('');
            return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:1rem;">${cards}</div>`;
        }

        function buildFleetInsights(allBoats) {
            const names = allBoats.map(b => b.label.split(' ').slice(0,2).join(' '));
            const insights = [];

            const get = (b, key) => { const v = b.analysis ? b.analysis[key] : null; return (v !== null && v !== undefined && !isNaN(v)) ? v : null; };

            // VMG spread
            const vmgs = allBoats.map(b => get(b, 'avgVMG'));
            const validVMG = vmgs.filter(v => v !== null);
            if (validVMG.length >= 2) {
                const maxV = Math.max(...validVMG), minV = Math.min(...validVMG);
                if (maxV - minV > 0.05) {
                    const li = vmgs.indexOf(maxV), ti = vmgs.indexOf(minV);
                    const metersGained = Math.round((maxV-minV) * 0.514444 * 10 * 60);
                    insights.push({ type: 'gap', title: 'Upwind VMG Spread',
                        text: `<strong>${names[li]}</strong> leads with ${maxV.toFixed(2)} kts VMG vs <strong>${names[ti]}</strong> at ${minV.toFixed(2)} kts — a ${(maxV-minV).toFixed(2)} kt gap. Over a 10-min upwind leg that's ~<strong>${metersGained}m</strong>.` });
                }
            }

            // Leeway spread
            const leeway = allBoats.map(b => get(b, 'avgLeeway'));
            const validLw = leeway.filter(v => v !== null);
            if (validLw.length >= 2) {
                const maxL = Math.max(...validLw), minL = Math.min(...validLw);
                if (maxL - minL > 1.5) {
                    const wi = leeway.indexOf(maxL), bi = leeway.indexOf(minL);
                    insights.push({ type: 'neutral', title: 'Leeway Spread',
                        text: `<strong>${names[bi]}</strong> makes the least leeway (${minL.toFixed(1)}°) vs <strong>${names[wi]}</strong> at ${maxL.toFixed(1)}°. Leeway is closely linked to heel — the flattest boat usually slips least.` });
                }
            }

            // Tack efficiency
            const tackEffs = allBoats.map(b => get(b, 'tackEfficiency'));
            const validTE = tackEffs.filter(v => v !== null);
            if (validTE.length >= 2) {
                const maxTE = Math.max(...validTE), minTE = Math.min(...validTE);
                if (maxTE - minTE > 4) {
                    const bi = tackEffs.indexOf(maxTE), wi = tackEffs.indexOf(minTE);
                    insights.push({ type: 'neutral', title: 'Tack Quality Spread',
                        text: `<strong>${names[bi]}</strong> exits tacks at ${maxTE.toFixed(0)}% of entry speed vs <strong>${names[wi]}</strong> at ${minTE.toFixed(0)}%. In a race with 15+ tacks that compounds significantly.` });
                }
            }

            // Pointing angle
            const pointing = allBoats.map(b => get(b, 'bestPointing'));
            const validPt = pointing.filter(v => v !== null && v > 0);
            if (validPt.length >= 2) {
                const minP = Math.min(...validPt), maxP = Math.max(...validPt);
                if (maxP - minP > 2) {
                    const ti = pointing.indexOf(minP);
                    insights.push({ type: 'neutral', title: 'Pointing Angle',
                        text: `<strong>${names[ti]}</strong> points tightest at ${minP.toFixed(1)}° TWA. Fleet range: ${minP.toFixed(1)}°–${maxP.toFixed(1)}° (${(maxP-minP).toFixed(1)}° spread). Tighter pointing shortens the course to the windward mark — if VMG holds up.` });
                }
            }

            // Downwind speed
            const dwSpeeds = allBoats.map(b => get(b, 'avgDownwindSpeed'));
            const validDW = dwSpeeds.filter(v => v !== null);
            if (validDW.length >= 2) {
                const maxDW = Math.max(...validDW), minDW = Math.min(...validDW);
                if (maxDW - minDW > 0.15) {
                    const fi = dwSpeeds.indexOf(maxDW), si = dwSpeeds.indexOf(minDW);
                    const mGained = Math.round((maxDW-minDW) * 0.514444 * 8 * 60);
                    insights.push({ type: 'neutral', title: 'Downwind Speed Spread',
                        text: `<strong>${names[fi]}</strong> fastest downwind at ${maxDW.toFixed(2)} kts, <strong>${names[si]}</strong> slowest at ${minDW.toFixed(2)} kts. Over an 8-min run that's ~<strong>${mGained}m</strong>.` });
                }
            }

            // Heel angle — with class benchmark if available
            const heels = allBoats.map(b => get(b, 'avgHeel'));
            const validH = heels.filter(v => v !== null && v > 0);
            if (validH.length >= 2) {
                const maxH = Math.max(...validH), minH = Math.min(...validH);
                if (maxH - minH >= 3) {
                    let heelText = `Optimal upwind heel ranges ${minH.toFixed(0)}°–${maxH.toFixed(0)}° across the fleet.`;
                    try {
                        const benchmarks = getActiveBenchmarks();
                        const classLabel = getClassLabel();
                        if (benchmarks && benchmarks.heel_upwind) {
                            const target = benchmarks.heel_upwind.easing_trigger || benchmarks.heel_upwind.max;
                            if (target) {
                                const overTarget = allBoats.filter((b,i) => heels[i] !== null && heels[i] > target);
                                heelText += ` ${classLabel} target is ≤${target}° — ` +
                                    (overTarget.length > 0
                                        ? `${overTarget.map(b=>b.label).join(', ')} ${overTarget.length===1?'is':'are'} above target.`
                                        : `all boats are within target.`);
                            }
                        } else {
                            heelText += ` Flatter is generally better for leeway and foil efficiency.`;
                        }
                    } catch(e) { heelText += ` Flatter is generally better for leeway and foil efficiency.`; }
                    insights.push({ type: 'neutral', title: 'Heel Angle Spread', text: heelText });
                }
            }

            if (insights.length === 0) {
                insights.push({ type: 'neutral', title: 'Close Fleet',
                    text: 'These boats are very evenly matched. Differences are likely in tactics, starts, and crew work rather than boat speed.' });
            }

            const typeStyle = { gap: 'border-left:3px solid #EF4444;', strength: 'border-left:3px solid #22C55E;', neutral: 'border-left:3px solid #374151;' };
            const cards = insights.map(ins =>

            return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;padding:1rem;">${cards}</div>`;
        }

        function buildFleetMetricsTable(allBoats) {
            // Groups: each entry is { groupLabel, rows[] }
            const groups = [
                { label: 'Speed', rows: [
                    { label: 'Avg Upwind BSP (kts)',  key: 'avgUpwindSpeed',   fmt: v => v.toFixed(2), higherBetter: true },
                    { label: 'Avg Downwind BSP (kts)', key: 'avgDownwindSpeed', fmt: v => v.toFixed(2), higherBetter: true },
                    { label: 'Max Speed (kts)',         key: 'maxSpeed',         fmt: v => v.toFixed(1), higherBetter: true },
                ]},
                { label: 'VMG', rows: [
                    { label: 'Avg Upwind VMG (kts)',   key: 'avgVMG',           fmt: v => v.toFixed(2), higherBetter: true },
                    { label: 'Best VMG (kts)',          key: 'bestVMGUp',        fmt: v => v.toFixed(2), higherBetter: true },
                    { label: 'VMG Efficiency (%)',      key: 'vmgEfficiency',    fmt: v => v.toFixed(0), higherBetter: true },
                ]},
                { label: 'Angles', rows: [
                    { label: 'Best VMG Heel (°)',       key: 'avgHeel',          fmt: v => v.toFixed(1), higherBetter: null },
                    { label: 'Best Pointing (° TWA)',   key: 'bestPointing',     fmt: v => v.toFixed(1), higherBetter: false },
                    { label: 'Avg Leeway (°)',          key: 'avgLeeway',        fmt: v => v.toFixed(1), higherBetter: false },
                ]},
                { label: 'Maneuvers', rows: [
                    { label: 'Tack Count',             key: 'tacksCount',       fmt: v => v.toFixed(0), higherBetter: null },
                    { label: 'Avg Tack Loss (m)',       key: 'avgTackLoss',      fmt: v => v.toFixed(1), higherBetter: false },
                    { label: 'Tack Efficiency (%)',     key: 'tackEfficiency',   fmt: v => v.toFixed(0), higherBetter: true },
                    { label: 'Gybe Count',             key: 'gybeCount',        fmt: v => v.toFixed(0), higherBetter: null },
                    { label: 'Avg Gybe Loss (m)',       key: 'avgGybeLoss',      fmt: v => v.toFixed(1), higherBetter: false },
                ]},
                { label: 'Overall', rows: [
                    { label: 'Total Distance (nm)',    key: 'distanceSailed',   fmt: v => v.toFixed(2), higherBetter: true },
                    { label: 'Handling Score',         key: 'boatHandlingScore',fmt: v => v.toFixed(0), higherBetter: true },
                ]},
            ];

            const headerCols = allBoats.map(b =>
                `<th style="padding:10px 16px;text-align:center;font-size:0.8rem;font-weight:700;color:${b.color};white-space:nowrap;">${b.label}</th>`
            ).join('');

            let rowIndex = 0;
            const bodyRows = groups.map(group => {
                return group.rows.map((m, gi) => {
                    const vals = allBoats.map(b => {
                        const v = b.analysis ? b.analysis[m.key] : null;
                        return (v !== null && v !== undefined && !isNaN(v) && v !== 0) ? v : null;
                    });
                    const validVals = vals.filter(v => v !== null);
                    const best = validVals.length > 1 && m.higherBetter !== null
                        ? (m.higherBetter ? Math.max(...validVals) : Math.min(...validVals))
                        : null;

                    const cells = vals.map((v, ci) => {
                        if (v === null) return `<td style="padding:10px 16px;text-align:center;color:#6B7280;">—</td>`;
                        const isBest = best !== null && Math.abs(v - best) < 0.001;
                        const style = isBest
                            ? `background:${allBoats[ci].color}22;color:${allBoats[ci].color};font-weight:700;`
                            : `color:#D1D5DB;`;
                        return `<td style="padding:10px 16px;text-align:center;${style}">${m.fmt(v)}${isBest ? ' ★' : ''}</td>`;
                    }).join('');

                    const isFirstInGroup = gi === 0;
                    const rowBg = rowIndex++ % 2 === 0 ? 'background:#111827;' : 'background:#1F2937;';
                    const groupBorder = isFirstInGroup ? 'border-top:2px solid #374151;' : '';
                    const groupLabel = isFirstInGroup
                        ? `<td colspan="${allBoats.length + 1}" style="padding:4px 16px 2px;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4B5563;background:#0D1B2E;${groupBorder}">${group.label}</td>`
                        : null;

                    const dataRow = `<tr style="${rowBg}">
                        <td style="padding:10px 16px;font-size:0.8rem;color:#9CA3AF;white-space:nowrap;">${m.label}</td>
                        ${cells}
                    </tr>`;

                    return groupLabel ? `<tr>${groupLabel}</tr>${dataRow}` : dataRow;
                }).join('');
            }).join('');

            return `<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
                <thead>
                    <tr style="background:#0D1B2E;">
                        <th style="padding:10px 16px;text-align:left;font-size:0.75rem;color:#6B7280;">Metric</th>
